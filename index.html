<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThreatGrapher - MITRE ATT&CK Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/darkly/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.plot.ly/plotly-2.35.0.min.js"></script>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar-custom">
        <div style="display:flex;align-items:center">
            <span style="font-weight:700;font-size:22px;color:#3498db;letter-spacing:2px;font-family:Rajdhani,sans-serif">THREAT</span>
            <span style="font-weight:700;font-size:22px;color:#e0e0e0;letter-spacing:2px;font-family:Rajdhani,sans-serif">GRAPHER</span>
        </div>
        <div style="display:flex;align-items:center;margin-left:20px">
            <div style="width:8px;height:8px;border-radius:50%;background-color:#2ecc71;display:inline-block;margin-right:8px;box-shadow:0 0 6px #2ecc71"></div>
            <span style="color:#555;font-size:11px;letter-spacing:3px;font-family:Share Tech Mono,monospace">MITRE ATT&CK VISUALIZER</span>
        </div>
        <div style="margin-left:auto;display:flex;gap:2px">
            <button class="view-btn active" id="btn-view-techniques" onclick="switchView('techniques')">Techniques</button>
            <button class="view-btn" id="btn-view-detections" onclick="switchView('detections')">Detections</button>
            <button class="view-btn" id="btn-view-coverage" onclick="switchView('coverage')">Coverage</button>
        </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar-container">
        <div style="font-size:10px;letter-spacing:3px;color:#555;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #2a2a4a;font-family:Share Tech Mono,monospace">TECHNIQUES</div>
        <input id="search-input" type="text" placeholder="Search techniques..."
               style="width:100%;background:#0a0a1a;border:1px solid #2a2a4a;color:#e0e0e0;margin-bottom:12px;border-radius:4px;font-size:13px;padding:6px 10px;font-family:Share Tech Mono,monospace;box-sizing:border-box"
               oninput="filterSidebar(this.value)">
        <div id="sidebar-techniques"></div>
    </div>

    <!-- Techniques View -->
    <div id="techniques-view">
        <div id="stats-panel"></div>
        <div id="metadata-panel">
            <div style="padding:60px 20px">
                <div style="font-size:28px;font-weight:700;letter-spacing:4px;color:#2a2a4a;text-align:center;margin-bottom:10px;font-family:Rajdhani,sans-serif">THREATGRAPHER</div>
                <div style="width:60px;height:2px;background:#3498db;margin:0 auto 20px auto;box-shadow:0 0 8px rgba(52,152,219,0.5)"></div>
                <p style="color:#444;text-align:center;font-size:14px;letter-spacing:1px">Select a technique from the sidebar to begin analysis</p>
            </div>
        </div>
        <br>
        <div id="loading-info"></div>
        <div id="file-tabs-container"></div>
        <div id="graph-container"></div>
        <br>
        <div id="table-container"></div>
    </div>

    <!-- Coverage View -->
    <div id="coverage-view" class="full-width-view"></div>

    <!-- Detections View -->
    <div id="detections-view" class="full-width-view"></div>

    <script src="app.js"></script>
</body>
</html>
